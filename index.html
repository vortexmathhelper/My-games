// =========================
// UTILS
// =========================

function isSchoolSafeUrl(url) {
  // Basic check; you control the domain list.
  // Make sure you only use domains that work at school.
  return url.startsWith("https://");
}

function createListItem(item, type) {
  const li = document.createElement("li");
  li.className = "list-item";
  li.textContent = item.title;
  li.addEventListener("click", () => {
    if (type === "game") {
      loadGame(item);
    } else {
      loadApp(item);
    }
  });
  return li;
}

// =========================
// RENDERING LISTS
// =========================

function renderLists(filteredGames = null, filteredApps = null) {
  const gameListEl = document.getElementById("gameList");
  const appListEl = document.getElementById("appList");
  if (!gameListEl || !appListEl) return;

  gameListEl.innerHTML = "";
  appListEl.innerHTML = "";

  const g = filteredGames || games;
  const a = filteredApps || apps;

  g.forEach(game => {
    if (isSchoolSafeUrl(game.url)) {
      gameListEl.appendChild(createListItem(game, "game"));
    }
  });

  a.forEach(app => {
    if (isSchoolSafeUrl(app.url)) {
      appListEl.appendChild(createListItem(app, "app"));
    }
  });
}

// =========================
// LOADING GAME / APP
// =========================

function setViewerTitle(text) {
  const titleEl = document.getElementById("viewerTitle");
  if (titleEl) titleEl.textContent = text;
}

function loadGame(game) {
  const frame = document.getElementById("viewerFrame");
  if (!frame) return;
  if (!isSchoolSafeUrl(game.url)) {
    setViewerTitle("Blocked / Not school-safe");
    frame.src = "about:blank";
    return;
  }
  frame.src = game.url;
  setViewerTitle(game.title + " (Game)");
}

function loadApp(app) {
  const frame = document.getElementById("viewerFrame");
  if (!frame) return;
  if (!isSchoolSafeUrl(app.url)) {
    setViewerTitle("Blocked / Not school-safe");
    frame.src = "about:blank";
    return;
  }
  frame.src = app.url;
  setViewerTitle(app.title + " (App)");
}

// =========================
// SEARCH ENGINE
// =========================

function setupSearch() {
  const searchInput = document.getElementById("searchInput");
  if (!searchInput) return;

  searchInput.addEventListener("input", () => {
    const q = searchInput.value.trim().toLowerCase();

    if (!q) {
      renderLists();
      return;
    }

    const filteredGames = games.filter(g =>
      g.title.toLowerCase().includes(q) ||
      g.category.toLowerCase().includes(q) ||
      (g.tags && g.tags.some(t => t.toLowerCase().includes(q)))
    );

    const filteredApps = apps.filter(a =>
      a.title.toLowerCase().includes(q) ||
      a.category.toLowerCase().includes(q) ||
      (a.tags && a.tags.some(t => t.toLowerCase().includes(q)))
    );

    renderLists(filteredGames, filteredApps);
  });
}

// =========================
// ON-PAGE AI HELPER
// =========================

function addAIMessage(text, who = "bot") {
  const chat = document.getElementById("aiChat");
  if (!chat) return;

  const msg = document.createElement("div");
  msg.className = "ai-msg " + (who === "user" ? "ai-user" : "ai-bot");
  msg.textContent = text;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

function handleAIInput() {
  const input = document.getElementById("aiInput");
  if (!input) return;
  const raw = input.value.trim();
  if (!raw) return;

  addAIMessage(raw, "user");
  input.value = "";

  const lower = raw.toLowerCase();
  let reply = "";

  if (lower.includes("hi") || lower.includes("hello")) {
    reply = "Hey! I’m the VORTEX helper. I can explain how to use this hub and where things are.";
  } else if (lower.includes("game") && lower.includes("best")) {
    reply = "Some popular picks here are Slope, Run 3, Moto X3M, and Retro Bowl. Click them in the list to load.";
  } else if (lower.includes("school") || lower.includes("blocked")) {
    reply = "I try to only show iframe‑friendly HTML5 games. If something is blocked, swap the URL in the games list to a school‑safe mirror.";
  } else if (lower.includes("search")) {
    reply = "Use the search bar at the top. It filters both games and apps by title, category, and tags.";
  } else if (lower.includes("add") && lower.includes("game")) {
    reply = "To add a game, edit index.html, find the games array, and add a new { title, url, category, tags } entry.";
  } else if (lower.includes("add") && lower.includes("app")) {
    reply = "To add an app, edit the apps array the same way: { title, url, category, tags }.";
  } else if (lower.includes("help") || lower.includes("what can you do")) {
    reply = "I can explain how this hub works, where to click, and how to add more games/apps by editing index.html.";
  } else {
    reply = "I’m a small on‑page helper, not a full AI like this chat, but I can guide you around VORTEX and explain how to edit the file.";
  }

  setTimeout(() => addAIMessage(reply, "bot"), 200);
}

function setupAI() {
  const sendBtn = document.getElementById("aiSend");
  const input = document.getElementById("aiInput");

  if (sendBtn) {
    sendBtn.addEventListener("click", handleAIInput);
  }
  if (input) {
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        handleAIInput();
      }
    });
  }
}
