<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VORTEX Hub</title>
<style>
  body {
    margin: 0;
    background: #0a0a12;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }
  header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 50px;
    background: #111;
    display: flex;
    align-items: center;
    padding: 0 10px;
    z-index: 10;
  }
  #searchInput {
    margin-left: 10px;
    padding: 6px;
    border-radius: 4px;
    border: none;
    outline: none;
    width: 260px;
  }
  .container {
    display: flex;
    flex: 1;
    margin-top: 50px;
  }
  .sidebar {
    width: 260px;
    background: #141422;
    border-right: 1px solid #222;
    display: flex;
    flex-direction: column;
  }
  .sidebar h2 {
    margin: 10px;
    font-size: 16px;
  }
  .list {
    flex: 1;
    overflow-y: auto;
    padding: 0 10px 10px;
  }
  .list ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .list-item {
    padding: 6px 8px;
    margin-bottom: 4px;
    background: #1d1d33;
    border-radius: 4px;
    cursor: pointer;
  }
  .list-item:hover {
    background: #2a2a44;
  }
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  #viewerTitle {
    padding: 10px;
    font-size: 16px;
  }
  #viewerFrame {
    flex: 1;
    width: 100%;
    border: none;
    background: black;
  }
  .ai-panel {
    height: 190px;
    background: #141422;
    border-top: 1px solid #222;
    display: flex;
    flex-direction: column;
  }
  #aiChat {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    font-size: 13px;
  }
  .ai-msg {
    padding: 6px;
    margin-bottom: 6px;
    border-radius: 4px;
    max-width: 90%;
  }
  .ai-bot { background: #1f1f3a; }
  .ai-user { background: #2b7cff; align-self: flex-end; }
  .ai-input-row {
    display: flex;
    padding: 6px;
    gap: 6px;
  }
  #aiInput {
    flex: 1;
    padding: 6px;
    border-radius: 4px;
    border: none;
    outline: none;
  }
  #aiSend {
    padding: 6px 10px;
    border: none;
    background: #2b7cff;
    color: white;
    border-radius: 4px;
    cursor: pointer;
  }
</style>
</head>

<body>

<header>
  <h1>VORTEX Hub</h1>
  <input id="searchInput" placeholder="Search games & apps...">
</header>

<div class="container">
  <div class="sidebar">
    <h2>Games</h2>
    <div class="list"><ul id="gameList"></ul></div>

    <h2>Apps</h2>
    <div class="list"><ul id="appList"></ul></div>
  </div>

  <div class="main">
    <div id="viewerTitle">Select something to load</div>
    <iframe id="viewerFrame"></iframe>

    <div class="ai-panel">
      <div id="aiChat"></div>
      <div class="ai-input-row">
        <input id="aiInput" placeholder="Ask the VORTEX helper...">
        <button id="aiSend">Send</button>
      </div>
    </div>
  </div>
</div>

<script>
// =========================
// WORKING GAMES
// =========================

const games = [
  { title: "Slope", url: "https://ubg100.github.io/slope/" },
  { title: "Run 3", url: "https://ubg100.github.io/run-3/" },
  { title: "Tunnel Rush", url: "https://ubg100.github.io/tunnel-rush/" },
  { title: "Subway Surfers", url: "https://ubg100.github.io/subway-surfers/" },
  { title: "Geometry Dash", url: "https://ubg100.github.io/geometry-dash/" },
  { title: "Basketball Stars", url: "https://ubg100.github.io/basketball-stars/" },
  { title: "Retro Bowl", url: "https://ubg100.github.io/retro-bowl/" },
  { title: "Moto X3M", url: "https://ubg100.github.io/moto-x3m/" },
  { title: "Drift Hunters", url: "https://ubg100.github.io/drift-hunters/" },
  { title: "1v1.lol", url: "https://ubg100.github.io/1v1-lol/" },
  { title: "Shell Shockers", url: "https://ubg100.github.io/shell-shockers/" },
  { title: "2048", url: "https://ubg100.github.io/2048/" },
  { title: "Cut the Rope", url: "https://ubg100.github.io/cut-the-rope/" },
  { title: "Idle Breakout", url: "https://ubg100.github.io/idle-breakout/" },
  { title: "Stickman Hook", url: "https://ubg100.github.io/stickman-hook/" }
];

// =========================
// WORKING APPS
// =========================

const apps = [
  { title: "Scientific Calculator", url: "https://www.desmos.com/scientific" },
  { title: "Graphing Calculator", url: "https://www.desmos.com/calculator" },
  { title: "Online Notepad", url: "https://anotepad.com/" },
  { title: "Pixel Art Editor", url: "https://www.pixilart.com/draw" },
  { title: "Music Maker", url: "https://onlinesequencer.net/" },
  { title: "JS Playground", url: "https://jsfiddle.net/" },
  { title: "HTML Playground", url: "https://codepen.io/pen/" },
  { title: "Timer", url: "https://timer.onlineclock.net/" },
  { title: "Unit Converter", url: "https://www.unitconverters.net/" }
];

// =========================
// RENDER LISTS
// =========================

function renderLists() {
  const gList = document.getElementById("gameList");
  const aList = document.getElementById("appList");
  gList.innerHTML = "";
  aList.innerHTML = "";

  games.forEach(g => {
    const li = document.createElement("li");
    li.className = "list-item";
    li.textContent = g.title;
    li.onclick = () => loadGame(g);
    gList.appendChild(li);
  });

  apps.forEach(a => {
    const li = document.createElement("li");
    li.className = "list-item";
    li.textContent = a.title;
    li.onclick = () => loadApp(a);
    aList.appendChild(li);
  });
}

// =========================
// LOAD GAME / APP
// =========================

function loadGame(g) {
  document.getElementById("viewerTitle").textContent = g.title;
  document.getElementById("viewerFrame").src = g.url;
}

function loadApp(a) {
  document.getElementById("viewerTitle").textContent = a.title;
  document.getElementById("viewerFrame").src = a.url;
}

// =========================
// SEARCH
// =========================

document.getElementById("searchInput").addEventListener("input", () => {
  const q = searchInput.value.toLowerCase();
  const filteredGames = games.filter(g => g.title.toLowerCase().includes(q));
  const filteredApps = apps.filter(a => a.title.toLowerCase().includes(q));
  renderFiltered(filteredGames, filteredApps);
});

function renderFiltered(gamesF, appsF) {
  const gList = document.getElementById("gameList");
  const aList = document.getElementById("appList");
  gList.innerHTML = "";
  aList.innerHTML = "";

  gamesF.forEach(g => {
    const li = document.createElement("li");
    li.className = "list-item";
    li.textContent = g.title;
    li.onclick = () => loadGame(g);
    gList.appendChild(li);
  });

  appsF.forEach(a => {
    const li = document.createElement("li");
    li.className = "list-item";
    li.textContent = a.title;
    li.onclick = () => loadApp(a);
    aList.appendChild(li);
  });
}

// =========================
// AI – Smart Local Assistant
// =========================

function addAIMessage(text, who="bot") {
  const chat = document.getElementById("aiChat");
  const msg = document.createElement("div");
  msg.className = "ai-msg " + (who === "user" ? "ai-user" : "ai-bot");
  msg.textContent = text;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

function handleAI() {
  const input = document.getElementById("aiInput");
  const text = input.value.trim();
  if (!text) return;

  addAIMessage(text, "user");
  input.value = "";

  const lower = text.toLowerCase();

  if (lower.includes("best game")) {
    return addAIMessage("Slope, Run 3, Moto X3M, Retro Bowl, and 1v1.lol are top picks.");
  }

  if (lower.includes("best app")) {
    return addAIMessage("Desmos, Pixel Art Editor, and CodePen are great choices.");
  }

  if (lower.includes("help")) {
    return addAIMessage("You can load games on the left, apps below them, and ask me anything.");
  }

  if (lower.includes("random game")) {
    const g = games[Math.floor(Math.random() * games.length)];
    loadGame(g);
    return addAIMessage("Random game loaded: " + g.title);
  }

  if (lower.includes("random app")) {
    const a = apps[Math.floor(Math.random() * apps.length)];
    loadApp(a);
    return addAIMessage("Random app loaded: " + a.title);
  }

  addAIMessage("I can help with games, apps, search, and info. Try asking: 'best game', 'random game', or 'help'.");
}

document.getElementById("aiSend").addEventListener("click", handleAI);
document.getElementById("aiInput").addEventListener("keydown", e => {
  if (e.key === "Enter") handleAI();
});

// =========================
// INIT
// =========================

renderLists();
addAIMessage("Welcome to VORTEX Hub! Type 'help' to see what I can do.");
</script>

</body>
</html>
